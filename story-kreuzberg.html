<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1080" />
  <title>Instagram Story — Kreuzberg</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 1080px;
      height: 1920px;
      overflow: hidden;
      background: #090909;
    }

    .story {
      position: relative;
      width: 1080px;
      height: 1920px;
      overflow: hidden;
      font-family: 'Inter', sans-serif;
    }

    /* Background photo */
    .bg {
      position: absolute;
      inset: 0;
      background-image: url('Kreuzberg/IMG_1104.jpg');
      background-size: cover;
      background-position: center 30%;
      filter: contrast(1.05) saturate(0.75);
    }

    /* Gradient overlays */
    .gradient-top {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 500px;
      background: linear-gradient(to bottom,
        rgba(9,9,9,0.82) 0%,
        rgba(9,9,9,0.3) 60%,
        transparent 100%
      );
    }
    .gradient-bottom {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 900px;
      background: linear-gradient(to top,
        rgba(9,9,9,0.96) 0%,
        rgba(9,9,9,0.85) 30%,
        rgba(9,9,9,0.5) 65%,
        transparent 100%
      );
    }

    /* Content */
    .content {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 100px 88px;
    }

    /* Top — byline */
    .top {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }
    .new-label {
      display: inline-flex;
      align-items: center;
      gap: 16px;
      font-size: 22px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #e8d5a8;
      font-weight: 400;
    }
    .new-label::before {
      content: '';
      display: block;
      width: 48px;
      height: 1px;
      background: #e8d5a8;
      opacity: 0.7;
    }
    .byline {
      font-size: 22px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(240,237,232,0.45);
      font-weight: 300;
    }

    /* Bottom — main text */
    .bottom {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .essay-label {
      font-size: 22px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #7ed4e6;
      margin-bottom: 36px;
      font-weight: 400;
    }

    .title-small {
      font-family: 'Playfair Display', serif;
      font-size: 34px;
      font-weight: 400;
      color: rgba(240,237,232,0.55);
      font-style: italic;
      line-height: 1.3;
      margin-bottom: 12px;
    }

    .title-main {
      font-family: 'Playfair Display', serif;
      font-size: 112px;
      font-weight: 700;
      color: #f0ede8;
      line-height: 0.95;
      letter-spacing: -0.02em;
      margin-bottom: 8px;
    }

    .title-sub {
      font-family: 'Playfair Display', serif;
      font-size: 88px;
      font-weight: 400;
      font-style: italic;
      color: #e8d5a8;
      line-height: 1;
      letter-spacing: -0.01em;
      margin-bottom: 64px;
    }

    .divider {
      width: 64px;
      height: 1px;
      background: rgba(232,213,168,0.4);
      margin-bottom: 52px;
    }

    .quote {
      font-family: 'Playfair Display', serif;
      font-size: 32px;
      font-style: italic;
      color: rgba(240,237,232,0.7);
      line-height: 1.7;
      max-width: 820px;
      margin-bottom: 72px;
    }

    .url-row {
      display: flex;
      align-items: center;
      gap: 24px;
    }
    .url-icon {
      width: 44px;
      height: 44px;
      border: 1px solid rgba(232,213,168,0.35);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .url-icon svg {
      width: 20px;
      height: 20px;
    }
    .url-text {
      font-size: 28px;
      letter-spacing: 0.06em;
      color: rgba(240,237,232,0.6);
      font-weight: 300;
    }
    .url-text strong {
      color: #e8d5a8;
      font-weight: 400;
    }
  </style>
</head>
<body>
<div class="story">

  <div class="bg"></div>
  <div class="gradient-top"></div>
  <div class="gradient-bottom"></div>

  <div class="content">

    <div class="top">
      <span class="new-label">New Photo Essay</span>
      <span class="byline">Shay Kashif &nbsp;·&nbsp; Berlin, Summer 2025</span>
    </div>

    <div class="bottom">
      <p class="essay-label">Photo Essay &nbsp;·&nbsp; Berlin</p>
      <p class="title-small">Golden Hour:</p>
      <h1 class="title-main">Roaming</h1>
      <h2 class="title-sub">Kreuzberg</h2>
      <div class="divider"></div>
      <p class="quote">"In Kreuzberg, I am just an XBerger, free of any label."</p>
      <div class="url-row">
        <div class="url-icon">
          <svg viewBox="0 0 32 32" fill="none" stroke="#e8d5a8" stroke-width="1.5">
            <circle cx="16" cy="16" r="13"/>
            <circle cx="16" cy="16" r="5.5"/>
          </svg>
        </div>
        <span class="url-text"><strong>shaykas.com</strong>/essay-kreuzberg</span>
      </div>
    </div>

  </div>

</div>
</body>
</html>
