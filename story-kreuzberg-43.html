<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1080" />
  <title>Instagram Post 4:3 — Kreuzberg</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 1080px;
      height: 810px;
      overflow: hidden;
      background: #090909;
    }

    .card {
      position: relative;
      width: 1080px;
      height: 810px;
      overflow: hidden;
      font-family: 'Inter', sans-serif;
    }

    /* Background photo */
    .bg {
      position: absolute;
      inset: 0;
      background-image: url('Kreuzberg/IMG_1104.jpg');
      background-size: cover;
      background-position: center 25%;
      filter: contrast(1.05) saturate(0.72);
    }

    /* Gradients */
    .gradient-left {
      position: absolute;
      inset: 0;
      background: linear-gradient(to right,
        rgba(9,9,9,0.88) 0%,
        rgba(9,9,9,0.55) 40%,
        rgba(9,9,9,0.1) 70%,
        transparent 100%
      );
    }
    .gradient-bottom {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 300px;
      background: linear-gradient(to top,
        rgba(9,9,9,0.75) 0%,
        transparent 100%
      );
    }

    /* Content */
    .content {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 52px 64px;
    }

    /* Top row */
    .top {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .new-label {
      display: inline-flex;
      align-items: center;
      gap: 14px;
      font-size: 13px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #e8d5a8;
    }
    .new-label::before {
      content: '';
      display: block;
      width: 32px;
      height: 1px;
      background: #e8d5a8;
      opacity: 0.6;
    }
    .top-right {
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(240,237,232,0.35);
    }

    /* Bottom block */
    .bottom {
      display: flex;
      flex-direction: column;
      gap: 0;
      max-width: 560px;
    }

    .essay-tag {
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #7ed4e6;
      margin-bottom: 20px;
    }

    .title-line1 {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      font-style: italic;
      font-weight: 400;
      color: rgba(240,237,232,0.55);
      line-height: 1;
      margin-bottom: 6px;
    }
    .title-line2 {
      font-family: 'Playfair Display', serif;
      font-size: 72px;
      font-weight: 700;
      color: #f0ede8;
      line-height: 0.92;
      letter-spacing: -0.02em;
      margin-bottom: 4px;
    }
    .title-line3 {
      font-family: 'Playfair Display', serif;
      font-size: 56px;
      font-style: italic;
      font-weight: 400;
      color: #e8d5a8;
      line-height: 1;
      letter-spacing: -0.01em;
      margin-bottom: 32px;
    }

    .divider {
      width: 40px;
      height: 1px;
      background: rgba(232,213,168,0.35);
      margin-bottom: 24px;
    }

    .url-row {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .url-icon {
      width: 28px;
      height: 28px;
      border: 1px solid rgba(232,213,168,0.3);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .url-icon svg { width: 13px; height: 13px; }
    .url-text {
      font-size: 14px;
      letter-spacing: 0.06em;
      color: rgba(240,237,232,0.5);
    }
    .url-text strong {
      color: #e8d5a8;
      font-weight: 400;
    }

    /* Film stock bottom right */
    .film-credit {
      position: absolute;
      bottom: 52px;
      right: 64px;
      text-align: right;
    }
    .film-credit p {
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(240,237,232,0.3);
      line-height: 1.8;
    }
  </style>
</head>
<body>
<div class="card">

  <div class="bg"></div>
  <div class="gradient-left"></div>
  <div class="gradient-bottom"></div>

  <div class="content">
    <div class="top">
      <span class="new-label">New Photo Essay</span>
      <span class="top-right">Shay Kashif &nbsp;·&nbsp; Berlin 2025</span>
    </div>

    <div class="bottom">
      <p class="essay-tag">Photo Essay &nbsp;·&nbsp; Berlin</p>
      <p class="title-line1">Golden Hour:</p>
      <h1 class="title-line2">Roaming</h1>
      <h2 class="title-line3">Kreuzberg</h2>
      <div class="divider"></div>
      <div class="url-row">
        <div class="url-icon">
          <svg viewBox="0 0 32 32" fill="none" stroke="#e8d5a8" stroke-width="1.5">
            <circle cx="16" cy="16" r="13"/>
            <circle cx="16" cy="16" r="5.5"/>
          </svg>
        </div>
        <span class="url-text"><strong>shaykas.com</strong>/essay-kreuzberg</span>
      </div>
    </div>
  </div>

  <div class="film-credit">
    <p>EOS R8 · EF 70–200mm</p>
    <p>Kreuzberg, Berlin</p>
  </div>

</div>
</body>
</html>
